<!doctype html>

<html lang="en" layout:decorate="~{layouts/layoutPrincipal}" xmlns:layout="http://www.w3.org/1999/xhtml">
<body>

<!-- main : c'est le contenu principal de la page -->
<!-- avec layout:fragment="contenu", je vais remplacer le main de mon layout par celui de ma page -->
<main layout:fragment="contenu">

    <h2 th:text="#{avis.titre(${film.titre})}"></h2>
    <form method="post" th:action="@{./avis}" th:object="${avis}">
        <label for="avisNote"></label>
        <select name="avisNote" id="avisNote" th:field="*{note}">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
        </select>
        <br>

        <label for="avisText"></label>
        <textarea class="input textarea"  name="avisText" id="avisText" cols="30" rows="10" th:field="*{commentaire}"></textarea>
        <br>
        <input class="button buttonAvis" type="submit" th:value="#{bouton.valider}">

    </form>

</main>
</body>
</html>
